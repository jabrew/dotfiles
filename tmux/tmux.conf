# Sets

if-shell "uname | grep -q Darwin" "source-file ~/dotfiles/tmux/tmux-macos"
if-shell "uname | grep -q Linux" "source-file ~/dotfiles/tmux/tmux-linux"

set -g history-limit 99999

set-option -g base-index 1
setw -g pane-base-index 1

set-option -g status-keys vi
set-window-option -g mode-keys vi

# Automatically renumber windows when one closes
set-option -g renumber-windows on

set -g status-left-length 1
set -g status-left " "

set -g set-titles on
set -g set-titles-string "#T"

# set -g status-right-length 0
set -g status-right "[#S]"

# Keybindings

bind -n S-Left select-window -p
bind -n S-Right select-window -n

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind-key \; command-prompt
bind-key : last-pane

# vi-copy mode bindings (clipboard handled by tmux-yank plugin)
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# https://github.com/seebi/tmux-colors-solarized
#### COLOUR (Solarized 256)

# New - tmux 3.1b

# default statusbar colors
set-option -g status-style fg=colour136,bg=colour235 #yellow and base02

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=default #base0 and default
#set-window-option -g window-status-style dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default #orange and default
#set-window-option -g window-status-current-style bright

# pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour240 #base01

# message text
set-option -g message-style fg=colour166,bg=colour235 #orange and base02

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# bell
set-window-option -g window-status-bell-style fg=colour235,bg=colour160 #base02, red

# Terminal and performance settings
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# tmux 3.6+ features
set -g allow-passthrough on

# Plugins (managed manually - see plugins.lock and install-plugins.sh)
run-shell ~/dotfiles/tmux/plugins/tmux-yank/yank.tmux
run-shell ~/dotfiles/tmux/plugins/extrakto/extrakto.tmux
run-shell ~/dotfiles/tmux/plugins/tmux-fingers/tmux-fingers.tmux
