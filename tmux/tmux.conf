# Sets

if-shell "uname | grep -q Darwin" "source-file ~/dotfiles/tmux/tmux-macos"
if-shell "uname | grep -q Linux" "source-file ~/dotfiles/tmux/tmux-linux"

set -g history-limit 99999

set-option -g base-index 1
setw -g pane-base-index 1

set-option -g status-keys vi
set-window-option -g mode-keys vi

# Automatically renumber windows when one closes
set-option -g renumber-windows on

set -g status-left-length 5
set -g status-left "#[bg=#ef9f76,fg=#303446]  #[fg=#303446,bg=#303446] "

set -g set-titles on
set -g set-titles-string "#{?#{@claude},claude,#W}#{?#{@indicator}, #{@indicator},}"

set -g status-right-length 20
set -g status-right "#[fg=#303446,bg=#303446] #[bg=#ef9f76,fg=#303446] #S "

# Keybindings

bind -n S-Left select-window -p
bind -n S-Right select-window -n

bind -n C-M-S-Left swap-window -t -1\; select-window -t -1
bind -n C-M-S-Right swap-window -t +1\; select-window -t +1

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind-key \; command-prompt
bind-key : last-pane

# vi-copy mode bindings (clipboard handled by tmux-yank plugin)
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

#### COLOUR (Catppuccin Frappe)

# Status bar
set-option -g status-style "bg=#303446,fg=#c6d0f5"

# Window title: show process name (automatic) or custom name (after prefix+,).
# @indicator is set by zsh precmd or Claude hooks to show pane state.
# Uses #W everywhere — with automatic-rename on it tracks the foreground process,
# and the claude wrapper sets allow-rename off to block OSC overrides during sessions.
set -g automatic-rename on
set -g window-status-separator "#[fg=#303446,bg=#303446] "

# Inactive window tabs
set-window-option -g window-status-style NONE
set-window-option -g window-status-format "#{?#{@claude},#[fg=#babbf1]#[bg=#51576d],#[fg=#a5adce]#[bg=#414559]} #I:#{?#{@claude},claude,#W}#{?#{@indicator}, #{@indicator},}#{?window_zoomed_flag, Z,} "

# Active window tab
set-window-option -g window-status-current-style NONE
set-window-option -g window-status-current-format "#{?#{@claude},#[fg=#303446]#[bg=#ca9ee6]#[bold],#[fg=#303446]#[bg=#8abcc5]#[bold]} #I:#{?#{@claude},claude,#W}#{?#{@indicator}, #{@indicator},}#{?window_zoomed_flag, Z,} #[nobold]"

# Pane borders
set-option -g pane-border-style "fg=#414559"
set-option -g pane-active-border-style "fg=#8abcc5"

# Messages and command prompt
set-option -g message-style "fg=#c6d0f5,bg=#414559"

# Pane number display
set-option -g display-panes-active-colour "#8abcc5"
set-option -g display-panes-colour "#51576d"

# Clock
set-window-option -g clock-mode-colour "#8abcc5"

# Bell
set-window-option -g window-status-bell-style "fg=#303446,bg=#e78284"

# Terminal and performance settings
set -sg escape-time 10
set -g focus-events on
set -g display-time 4000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# tmux-fingers on prefix+/ (prefix+f stays as find-window)
set -g @fingers-key /
set -g @fingers-show-copied-notification 1
set -g @fingers-backdrop-style "dim"

# tmux 3.6+ features
set -g allow-passthrough on
set -g extended-keys on
set -g set-clipboard on

# Plugins (managed manually - see plugins.lock and install-plugins.sh)
run-shell ~/dotfiles/tmux/plugins/tmux-yank/yank.tmux
run-shell ~/dotfiles/tmux/plugins/extrakto/extrakto.tmux
run-shell ~/dotfiles/tmux/plugins/tmux-fingers/tmux-fingers.tmux

# Copy last command + output to clipboard
bind o run-shell "~/dotfiles/bin/tmux-copy-last-output #{pane_id}"

# In copy mode: copy command + output block surrounding cursor
unbind -T copy-mode-vi O
bind -T copy-mode-vi o {
    send-keys -X search-backward "^❯"
    send-keys -X cursor-up
    send-keys -X begin-selection
    send-keys -X search-forward "^❯"
    send-keys -X search-forward "^❯"
    send-keys -X cursor-up
    send-keys -X end-of-line
    send-keys -X copy-selection-and-cancel
    display-message "Copied output block"
}
bind -T copy-mode-vi \{ send-keys -X search-backward "^❯"
bind -T copy-mode-vi \} send-keys -X search-forward "^❯"

# Override tmux-yank's prefix+Y to strip trailing newline when copying cwd
bind Y if-shell "uname | grep -q Darwin" \
  'run-shell "printf \"%s\" \"#{pane_current_path}\" | pbcopy; tmux display-message \"Copied: #{pane_current_path}\""' \
  'run-shell "printf \"%s\" \"#{pane_current_path}\" | xclip -selection clipboard; tmux display-message \"Copied: #{pane_current_path}\""'
