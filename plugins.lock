# Plugin lockfile - pins each plugin to a known working commit
# Format: install_path repo_url commit_sha
#
# To install: run install-plugins.sh
# To update a plugin: cd into its directory, git pull, then update the SHA here
# To update all: run install-plugins.sh --update (pulls latest, prints new SHAs)

